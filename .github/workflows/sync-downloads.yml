name: Sync BitBoxApp Downloads

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Sync GitHub release download data
        run: npm run sync
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit updated snapshot data
        run: |
          if git diff --quiet -- data/downloads.json docs/data/downloads.json; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/downloads.json docs/data/downloads.json
          git commit -m "chore: sync BitBoxApp download data"
          git push
